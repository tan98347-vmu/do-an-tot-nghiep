name: ai_doc_manager
description: AI Document Manager — Flutter Web
# build-trigger: 1

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  file_picker: ^10.3.10
  google_fonts: ^8.0.2
  timeago: ^3.6.1
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  flutter_markdown: ^0.7.7+1
  flutter_html: ^3.0.0-beta.2
  flutter_quill: ^11.5.0
  vsc_quill_delta_to_html: ^1.0.5
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
