worker_processes  1;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_x_forwarded_proto $proxy_forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $proxy_forwarded_proto $proxy_forwarded_ssl {
        https   on;
        default off;
    }

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    server {
        listen 8888;
        # Public host qua Cloudflare Tunnel phai match domain browser that
        server_name aiagentvmu.id.vn localhost 127.0.0.1;

        client_max_body_size 100m;
        root "G:/check/myworld/Scripts/backup 1-5 toi-uu/flutter_frontend/build/web";
        index index.html;

        location ^~ /browser {
            proxy_pass http://127.0.0.1:9980;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
        }

        location ^~ /hosting/discovery {
            proxy_pass http://127.0.0.1:9980;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
        }

        location ^~ /hosting/capabilities {
            proxy_pass http://127.0.0.1:9980;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
        }

        location ^~ /cool/adminws {
            proxy_pass http://127.0.0.1:9980;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
            proxy_read_timeout 36000s;
        }

        location ~ ^/cool/(.*)/ws$ {
            proxy_pass http://127.0.0.1:9980;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
            proxy_read_timeout 36000s;
        }

        location ~ ^/(c|l)ool {
            proxy_pass http://127.0.0.1:9980;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
            proxy_read_timeout 36000s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /api/auth/refresh/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
            proxy_connect_timeout 300s;
            proxy_send_timeout 36000s;
            proxy_read_timeout 36000s;
            send_timeout 36000s;
        }

        location /django-admin/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;
        }

        location /media/ {
            alias "G:/check/myworld/Scripts/backup 1-5 toi-uu/media/";
        }

        location /static/ {
            alias "G:/check/myworld/Scripts/backup 1-5 toi-uu/staticfiles/";
        }
    }
}
