map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $proxy_forwarded_proto $proxy_forwarded_ssl {
    https   on;
    default off;
}

server {
    listen 8080;
    # Cloudflare Tunnel forward toi 127.0.0.1:8080 -> server_name la domain that
    server_name tenmien.com www.tenmien.com localhost 127.0.0.1;

    client_max_body_size 100m;
    root "G:/check/myworld/Scripts/backup 1-5 toi-uu/flutter_frontend/build/web";
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/auth/refresh/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
        proxy_connect_timeout 300s;
        proxy_send_timeout 36000s;
        proxy_read_timeout 36000s;
        send_timeout 36000s;
    }

    location /django-admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl $proxy_forwarded_ssl;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    location /media/ {
        alias "G:/check/myworld/Scripts/backup 1-5 toi-uu/media/";
    }

    location /static/ {
        alias "G:/check/myworld/Scripts/backup 1-5 toi-uu/staticfiles/";
    }
}
